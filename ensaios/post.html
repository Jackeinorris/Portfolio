<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ensaio — J. V. Dias</title>
  <meta name="theme-color" content="#0a0a0a">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;400&family=Inter:wght@400;500&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../assets/images/Favicon.png">
  <link rel="stylesheet" href="../css/styles.css">

  <!-- Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked@14.0.0/marked.min.js"></script>
</head>
<body>

  <header class="site-header">
    <nav class="nav">
      <a href="../index.html" class="logo visible">J. V. Dias</a>
      <ul class="nav-links">
        <li><a href="../index.html#works">Projetos</a></li>
        <li><a href="../ensaios/">Ensaios</a></li>
        <li><a href="../about.html">Sobre</a></li>
      </ul>
    </nav>
  </header>

  <main class="ensaio-page" id="ensaio-page">

    <a href="./" class="back-link">&larr; Ensaios</a>

    <article class="ensaio-article">

      <div class="ensaio-cover-hero" id="ensaio-cover-hero"></div>

      <header class="ensaio-header">
        <h1 class="ensaio-title" id="ensaio-title"></h1>
        <div class="ensaio-info" id="ensaio-info"></div>
      </header>

      <div class="ensaio-video" id="ensaio-video"></div>

      <div class="ensaio-body" id="ensaio-body">
        <p class="ensaio-empty">Carregando...</p>
      </div>

      <div class="ensaio-tags" id="ensaio-tags"></div>

    </article>

    <nav class="ensaio-nav" id="ensaio-nav"></nav>

  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-name">J. V. Dias</span>
      <div class="footer-links">
        <a href="mailto:joaodias@jvdias.com">joaodias@jvdias.com</a>
        <span class="footer-sep">·</span>
        <a href="https://www.linkedin.com/in/JvDiasM" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <span class="footer-sep">·</span>
        <a href="../about.html">Sobre</a>
      </div>
    </div>
  </footer>

  <script>
    (async function () {
      const slug = new URLSearchParams(window.location.search).get("slug");
      if (!slug) {
        window.location.href = "./";
        return;
      }

      try {
        const res = await fetch("posts/posts.json");
        const posts = await res.json();

        const published = posts
          .filter((p) => !p.draft)
          .sort((a, b) => new Date(b.date) - new Date(a.date));

        const index = published.findIndex((p) => p.slug === slug);
        const post = published[index];

        if (!post) {
          document.getElementById("ensaio-body").innerHTML =
            '<p class="ensaio-empty">Ensaio nao encontrado.</p>';
          return;
        }

        // Title & meta
        document.title = `${post.title} — J. V. Dias`;

        // OG tags
        const ogTitle = document.querySelector('meta[property="og:title"]');
        if (ogTitle) ogTitle.content = post.title;

        const d = new Date(post.date + "T12:00:00");
        const dateStr = d.toLocaleDateString("pt-BR", {
          day: "numeric",
          month: "long",
          year: "numeric",
        });

        document.getElementById("ensaio-title").textContent = post.title;

        // Cover image (optional)
        if (post.coverImage) {
          const pos = post.coverPosition || "center";
          document.getElementById("ensaio-cover-hero").innerHTML =
            `<img src="${post.coverImage}" alt="${post.title}" style="object-position: ${pos};">`;
        }

        // Fetch markdown content
        const mdRes = await fetch(`posts/${slug}.md`);
        const md = await mdRes.text();

        // Reading time
        const words = md.split(/\s+/).length;
        const readTime = Math.max(1, Math.round(words / 200));

        document.getElementById("ensaio-info").innerHTML =
          `<time>${dateStr}</time><span class="ensaio-info-sep">·</span><span>${readTime} min de leitura</span>`;

        // Video (optional)
        if (post.videoUrl) {
          const videoId = post.videoUrl.match(/vimeo\.com\/(\d+)/)?.[1];
          if (videoId) {
            document.getElementById("ensaio-video").innerHTML = `
              <div class="ensaio-video-player">
                <iframe
                  src="https://player.vimeo.com/video/${videoId}?title=0&byline=0&portrait=0"
                  allow="autoplay; fullscreen; picture-in-picture"
                  frameborder="0">
                </iframe>
              </div>
            `;
          }
        }

        // Render markdown
        document.getElementById("ensaio-body").innerHTML = marked.parse(md);

        // Tags
        if (post.tags && post.tags.length) {
          document.getElementById("ensaio-tags").innerHTML = post.tags
            .map((t) => `<span class="ensaio-tag">${t}</span>`)
            .join("");
        }

        // Prev / Next navigation
        const prev = published[index + 1];
        const next = published[index - 1];
        const navEl = document.getElementById("ensaio-nav");

        if (prev || next) {
          navEl.innerHTML = `
            ${prev ? `<a href="post.html?slug=${prev.slug}" class="ensaio-nav-link ensaio-nav-prev"><span class="ensaio-nav-label">&larr; Anterior</span><span class="ensaio-nav-title">${prev.title}</span></a>` : '<span></span>'}
            ${next ? `<a href="post.html?slug=${next.slug}" class="ensaio-nav-link ensaio-nav-next"><span class="ensaio-nav-label">Proximo &rarr;</span><span class="ensaio-nav-title">${next.title}</span></a>` : '<span></span>'}
          `;
        }
      } catch (e) {
        document.getElementById("ensaio-body").innerHTML =
          '<p class="ensaio-empty">Erro ao carregar o ensaio.</p>';
      }
    })();
  </script>

</body>
</html>
